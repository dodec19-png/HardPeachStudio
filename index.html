<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 60px;
    font-size: 48px;
    font-weight: bold;
    user-select: none;
    z-index: 10;
    pointer-events: auto;
    color: transparent;
  }

  .menu-item { cursor: pointer; }

  #peach {
    position: fixed;
    width: 120px;
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, -50%);
  }

  #trailCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #permanentCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  #transition {
    position: fixed;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    transform: scale(0);
    z-index: 20;
  }
</style>
</head>
<body>

<div class="menu">
  <div class="menu-item" data-link="work.html">WORK</div>
  <div class="menu-item" data-link="about.html">ABOUT</div>
  <div class="menu-item" data-link="contact.html">CONTACT</div>
</div>

<div id="transition"></div>
<img id="peach" src="./peach.png" />

<canvas id="trailCanvas"></canvas>
<canvas id="permanentCanvas"></canvas>

<script>
  const trailCanvas = document.getElementById('trailCanvas');
  const permCanvas  = document.getElementById('permanentCanvas');
  const ctxTrail = trailCanvas.getContext('2d');
  const ctxPerm  = permCanvas.getContext('2d');
  const peach    = document.getElementById('peach');
  const menuItems = document.querySelectorAll('.menu-item');

  // 임시 캔버스 한 번만 생성
  const tmpCanvas = document.createElement('canvas');
  const ctxTmp = tmpCanvas.getContext('2d');

  function resize() {
    [trailCanvas, permCanvas, tmpCanvas].forEach(c => {
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
    });
  }
  resize();
  window.addEventListener('resize', resize);

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let x = window.innerWidth / 2;
  let y = window.innerHeight / 2;
  let vx = 0, vy = 0;
  let wanderAngle = Math.random() * Math.PI * 2;
  let time = 0;

  window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  const trails = [];
  const MAX_TRAIL = 400;

  function getMenuRects() {
    return Array.from(menuItems).map(item => ({
      text: item.textContent,
      rect: item.getBoundingClientRect()
    }));
  }

  function stampPink(px, py, radius) {
    const menus = getMenuRects();

    ctxTmp.clearRect(0, 0, tmpCanvas.width, tmpCanvas.height);

    // 1. 텍스트를 핑크로 그리기
    ctxTmp.globalCompositeOperation = 'source-over';
    ctxTmp.font = 'bold 48px Arial';
    ctxTmp.textBaseline = 'top';
    ctxTmp.fillStyle = '#f3a0b5';
    menus.forEach(m => {
      ctxTmp.fillText(m.text, m.rect.left, m.rect.top);
    });

    // 2. 현재 원과 교차 영역만 남기기
    ctxTmp.globalCompositeOperation = 'destination-in';
    ctxTmp.beginPath();
    ctxTmp.arc(px, py, radius, 0, Math.PI * 2);
    ctxTmp.fill();

    // 3. permCanvas에 누적 (지우지 않음)
    ctxPerm.globalCompositeOperation = 'source-over';
    ctxPerm.drawImage(tmpCanvas, 0, 0);
  }

  function draw() {
    time++;
    const dx = x - mouseX;
    const dy = y - mouseY;
    const dist = Math.hypot(dx, dy);

    const comfortZone = 180;
    const attractZone = 220;

    if (dist < comfortZone) {
      const angle = Math.atan2(dy, dx);
      const force = (comfortZone - dist) / comfortZone * 0.5;
      vx += Math.cos(angle) * force;
      vy += Math.sin(angle) * force;
    } else if (dist > attractZone) {
      const angle = Math.atan2(-dy, -dx);
      vx += Math.cos(angle) * 0.5;
      vy += Math.sin(angle) * 0.5;
    } else {
      wanderAngle += (Math.random() - 0.5) * 0.2;
      const orbitAngle = Math.atan2(dy, dx) + Math.PI + 0.4;
      vx += Math.cos(orbitAngle + wanderAngle * 0.3) * 0.09;
      vy += Math.sin(orbitAngle + wanderAngle * 0.3) * 0.09;
    }

    // 미세 진동
    vx += Math.sin(time * 0.07) * 0.05;
    vy += Math.cos(time * 0.11) * 0.05;

    vx *= 0.85;
    vy *= 0.85;

    const margin = 80;
    if (x < margin) vx += 0.8;
    if (x > window.innerWidth - margin) vx -= 0.8;
    if (y < margin) vy += 0.8;
    if (y > window.innerHeight - margin) vy -= 0.8;

    x += vx;
    y += vy;

    const speed = Math.hypot(vx, vy);
    const radius = Math.min(28 + speed * 2.5, 42);
    trails.push({ x, y, radius });
    if (trails.length > MAX_TRAIL) trails.shift();

    // 핑크 궤적
    ctxTrail.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
    trails.forEach((t, i) => {
      const age = i / trails.length;
      const expandedRadius = t.radius + (1 - age) * 18;
      const alpha = age * 0.75 + 0.05;
      ctxTrail.globalAlpha = alpha;
      ctxTrail.fillStyle = '#f3a0b5';
      ctxTrail.beginPath();
      ctxTrail.arc(t.x, t.y, expandedRadius, 0, Math.PI * 2);
      ctxTrail.fill();
    });
    ctxTrail.globalAlpha = 1;

    // 현재 위치 핑크 누적
    stampPink(x, y, radius + 18);

    peach.style.left = x + 'px';
    peach.style.top  = y + 'px';

    requestAnimationFrame(draw);
  }

  draw();

  const transition = document.getElementById('transition');
  menuItems.forEach(item => {
    item.addEventListener('click', () => {
      const r = item.getBoundingClientRect();
      transition.style.left = r.left + r.width / 2 + 'px';
      transition.style.top  = r.top  + r.height / 2 + 'px';
      transition.style.transform = 'translate(-50%, -50%) scale(0)';
      transition.style.transition = 'transform 0.9s ease-out';
      requestAnimationFrame(() => {
        transition.style.transform = 'translate(-50%, -50%) scale(150)';
      });
      setTimeout(() => { location.href = item.dataset.link; }, 900);
    });
  });
</script>

</body>
</html>
