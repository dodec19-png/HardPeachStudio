<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 60px;
    font-size: 48px;
    font-weight: bold;
    color: black;
    user-select: none;
    z-index: 10;
    pointer-events: auto;
  }

  #peach {
    position: fixed;
    width: 120px;
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, -50%);
  }

  #paint, #mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #paint { z-index: 1; }
  #mask { z-index: 3; }

  #transition {
    position: fixed;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    transform: scale(0);
    z-index: 20;
  }

  .mask {
    background: white;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>

<body>

<div class="menu">
  <div class="menu-item mask" data-link="work.html">WORK</div>
  <div class="menu-item mask" data-link="about.html">ABOUT</div>
  <div class="menu-item mask" data-link="contact.html">CONTACT</div>
</div>

<div id="transition"></div>

<img id="peach" src="./peach.png" />

<canvas id="paint"></canvas>
<canvas id="mask"></canvas>

<script>
  const paint = document.getElementById('paint');
  const mask = document.getElementById('mask');
  const ctxPaint = paint.getContext('2d');
  const ctxMask = mask.getContext('2d');
  const peach = document.getElementById('peach');

  function resize() {
    paint.width = window.innerWidth;
    paint.height = window.innerHeight;
    mask.width = window.innerWidth;
    mask.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let x = mouseX;
  let y = mouseY;

  window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function draw() {
  const followSpeedBase = 0.01;
const followSpeedRand = 0.04;

   const followSpeed =
  followSpeedBase + Math.random() * followSpeedRand;
const escapeSpeed = 0.6;   // 도망 반응 속도
const escapeRadius = 120;   // 도망 시작 거리
const escapePower = 10;    // 도망 세기

const dx = x - mouseX;
const dy = y - mouseY;
const dist = Math.hypot(dx, dy);

let targetX = mouseX;
let targetY = mouseY;

if (dist > 0.1 && dist < escapeRadius) {
  const force = (escapeRadius - dist) / escapeRadius;

  // 현재 도망 각도
  let angle = Math.atan2(dy, dx);

  // 랜덤 각도 편차 (라디안)
  const randomAngle = (Math.random() - 0.5) * 0.8;
  angle += randomAngle;

  targetX = x + Math.cos(angle) * force * escapePower;
  targetY = y + Math.sin(angle) * force * escapePower;
}
const speed = dist < escapeRadius ? escapeSpeed : followSpeed;

x += (targetX - x) * speed;
y += (targetY - y) * speed;


    // 분홍 경로
    ctxPaint.fillStyle = '#f3a0b5';
    ctxPaint.beginPath();
    ctxPaint.arc(x, y, 35, 0, Math.PI * 2);
    ctxPaint.fill();

    // 마스크 제거
    ctxMask.globalCompositeOperation = 'destination-out';
    ctxMask.beginPath();
    ctxMask.arc(x, y, 40, 0, Math.PI * 2);
    ctxMask.fill();
    ctxMask.globalCompositeOperation = 'source-over';

    peach.style.left = x + 'px';
    peach.style.top = y + 'px';

    requestAnimationFrame(draw);
  }

  draw();

  // 클릭 전환
  const transition = document.getElementById('transition');
  document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', () => {
      const r = item.getBoundingClientRect();
      transition.style.left = r.left + r.width / 2 + 'px';
      transition.style.top = r.top + r.height / 2 + 'px';
      transition.style.transform = 'translate(-50%, -50%) scale(0)';
      transition.style.transition = 'transform 0.9s ease-out';

      requestAnimationFrame(() => {
        transition.style.transform = 'translate(-50%, -50%) scale(150)';
      });

      setTimeout(() => {
        location.href = item.dataset.link;
      }, 900);
    });
  });
</script>

</body>
</html>
